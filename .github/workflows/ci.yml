name: Hostel CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore HostelManagement.sln

    - name: Build
      run: dotnet build HostelManagement.sln --no-restore -c Release

    - name: Test
      run: dotnet test Hostel.Tests/Hostel.Tests.csproj --no-build -c Release --verbosity normal

    - name: Build Web Project
      run: dotnet build Hostel.Web/Hostel.Web.csproj --no-restore -c Release

    - name: Publish
      if: github.ref == 'refs/heads/main'
      run: dotnet publish Hostel.ConsoleApp/Hostel.ConsoleApp.csproj -c Release -o ./publish

    - name: Upload Artifact
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: hostel-app
        path: ./publish
